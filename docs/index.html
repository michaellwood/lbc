<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Welcome, LBC</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #1a1a18;
      --muted: #6b6b68;
      --rule: #ddddd8;
      --bg: #faf9f7;
      --accent: #2d5a3d;
    }

    body {
      font-family: 'Source Sans 3', sans-serif;
      background: var(--bg);
      color: var(--ink);
      font-size: 17px;
      line-height: 1.7;
    }

    /* ── NAV ── */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.4rem 2.5rem;
      border-bottom: 1px solid var(--rule);
    }

    nav .site-name {
      font-family: 'Libre Baskerville', serif;
      font-size: 0.95rem;
      letter-spacing: 0.04em;
      color: var(--ink);
      text-decoration: none;
    }

    nav ul {
      list-style: none;
      display: flex;
      gap: 2rem;
    }

    nav ul a {
      text-decoration: none;
      color: var(--muted);
      font-size: 0.85rem;
      font-weight: 400;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      transition: color 0.2s;
    }

    nav ul a:hover { color: var(--ink); }

    /* ── HERO ── */
    .hero {
      max-width: 720px;
      margin: 5rem auto 4rem;
      padding: 0 2rem;
    }

    .hero .label {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1rem;
    }

    .hero h1 {
      font-family: 'Libre Baskerville', serif;
      font-size: clamp(2rem, 5vw, 3rem);
      line-height: 1.2;
      font-weight: 700;
      margin-bottom: 1.5rem;
      color: var(--ink);
    }

    .hero p {
      font-size: 1.05rem;
      color: var(--muted);
      max-width: 560px;
      margin-bottom: 2.5rem;
    }

    .hero hr {
      border: none;
      border-top: 1px solid var(--rule);
      margin-bottom: 2.5rem;
    }

    /* ── AUDIO PLAYER ── */
    .audio-block {
      background: #fff;
      border: 1px solid var(--rule);
      border-radius: 6px;
      padding: 1.5rem 1.8rem;
      margin-bottom: 3rem;
    }

    .audio-block .track-info {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 1rem;
    }

    .audio-block .track-title {
      font-family: 'Libre Baskerville', serif;
      font-size: 1rem;
      color: var(--ink);
    }

    .audio-block .track-meta {
      font-size: 0.8rem;
      color: var(--muted);
    }

    audio {
      width: 100%;
      height: 40px;
      outline: none;
    }

    /* Style the native audio element across browsers */
    audio::-webkit-media-controls-panel {
      background: #f4f3f0;
    }

    /* ── PROJECT IMAGE ── */
    .project-image {
      width: 100%;
      aspect-ratio: 16 / 7;
      object-fit: cover;
      border-radius: 4px;
      border: 1px solid var(--rule);
      margin-bottom: 3rem;
      display: block;
      background: #e8e7e3; /* placeholder color if image missing */
    }

    .image-caption {
      font-size: 0.82rem;
      color: var(--muted);
      margin-top: -2.5rem;
      margin-bottom: 3rem;
      font-style: italic;
    }

    /* ── BODY CONTENT ── */
    .content {
      max-width: 720px;
      margin: 0 auto;
      padding: 0 2rem 6rem;
    }

    .content h2 {
      font-family: 'Libre Baskerville', serif;
      font-size: 1.3rem;
      font-weight: 700;
      margin: 2.5rem 0 0.75rem;
      color: var(--ink);
    }

    .content p {
      color: #3a3a38;
      margin-bottom: 1.25rem;
    }

    /* ── TIMELINE LINK ── */
    .cta-row {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 3rem 0;
      padding: 1.5rem 1.8rem;
      border: 1px solid var(--rule);
      border-left: 3px solid var(--accent);
      border-radius: 4px;
      background: #fff;
    }

    .cta-row .cta-text {
      flex: 1;
    }

    .cta-row .cta-text strong {
      display: block;
      font-family: 'Libre Baskerville', serif;
      font-size: 0.95rem;
      margin-bottom: 0.2rem;
    }

    .cta-row .cta-text span {
      font-size: 0.85rem;
      color: var(--muted);
    }

    .cta-btn {
      display: inline-block;
      padding: 0.55rem 1.3rem;
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      border-radius: 3px;
      white-space: nowrap;
      transition: opacity 0.2s;
    }

    .cta-btn:hover { opacity: 0.85; }

    /* ── FOOTER ── */
    footer {
      border-top: 1px solid var(--rule);
      padding: 1.5rem 2.5rem;
      text-align: center;
      font-size: 0.8rem;
      color: var(--muted);
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      nav { padding: 1rem 1.2rem; }
      nav ul { gap: 1.2rem; }
      .hero, .content { padding-left: 1.2rem; padding-right: 1.2rem; }
      .cta-row { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>

  <nav>
    <a class="site-name" href="index.html">Project Name</a>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="timeline.html">Timeline</a></li>
      <!-- Add more nav links as needed -->
    </ul>
  </nav>

  <section class="hero">

    -->

    <!-- TIMELINE CTA -->
    <div class="cta-row">
      <div class="cta-text">
        <strong>Explore the Timeline</strong>
        <span>See the full chronology of events.</span>
      </div>
      <a class="cta-btn" href="timeline.html">View Timeline →</a>
    </div>

  </div>

  <footer>
    <!-- &copy; 2025 Your Name &nbsp;·&nbsp; Built with GitHub Pages -->

</body>
</html>
